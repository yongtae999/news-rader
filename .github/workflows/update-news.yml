name: Update News Data Daily

on:
  schedule:
    # 매일 아침 8시 (한국시간 기준 08:00 = UTC 23:00) 반복
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동으로도 버튼을 눌러 바로 실행할 수 있도록 허용

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies (if any)
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-genai

      - name: Run news crawler
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python update_news.py
        
      - name: Process Weekly Briefing (Thursdays only or Manual)
        # 스케줄에 의해 실행된 경우(수요일 UTC 23시) 또는 수동 실행(workflow_dispatch)인 경우에만 이 스텝을 실행합니다.
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DAY_OF_WEEK=$(date +%u)
          if [ "$DAY_OF_WEEK" -eq 3 ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Generating weekly briefing..."
            python generate_briefing.py
          else
            echo "Not Wednesday UTC (Thursday KST). Skipping briefing generation."
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data/newsData.json data/weekly_briefing.txt
          # 새 뉴스가 있어서 파일이 변경된 경우에만 커밋
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: Daily news sync & Briefing generation"
          git pull --rebase origin main
          git push
